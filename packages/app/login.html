<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoTrader — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/reset.css" />
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/page.css" />
    <script type="module" src="/src/login.ts"></script>
    <style>
      body {
        background-color: var(--color-background-page);
        color: var(--color-text);
        font-family: Inter, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: var(--space-lg);
        padding: var(--space-xl);
      }
      .brand {
        font-family: "Space Grotesk", sans-serif;
        font-size: 1.5rem; font-weight: 700;
        color: var(--color-accent); text-decoration: none;
      }
      h2 { font-family: "Space Grotesk", sans-serif; color: var(--color-text-header); margin: 0; }
      .card {
        background-color: var(--color-background-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--border-radius);
        padding: var(--space-xl); width: 100%; max-width: 380px;
      }
      label { display: flex; flex-direction: column; gap: var(--space-xs); font-size: 0.875rem; color: var(--color-text-muted); }
      input {
        background-color: var(--color-background-page);
        border: 1px solid var(--color-border);
        border-radius: var(--border-radius);
        color: var(--color-text);
        padding: var(--space-sm) var(--space-md);
        font-size: 1rem; font-family: inherit; outline: none;
      }
      input:focus { border-color: var(--color-accent-dim); }
      p { font-size: 0.875rem; color: var(--color-text-muted); }
      a { color: var(--color-accent); text-decoration: none; }
      a:hover { color: var(--color-link-hover); }
    </style>
</head>
<body>
    <auth-provider redirect="/app">
        <a class="brand" href="/app">▲ AlgoTrader</a>
        <h2>Sign In</h2>
        <div class="card">
            <login-form api="/auth/login">
                <label><span>Username</span><input name="username" autocomplete="off" /></label>
                <label><span>Password</span><input type="password" name="password" /></label>
            </login-form>
        </div>
        <p>Don't have an account? <a href="/new-user.html">Register here</a></p>
    </auth-provider>
</body>
</html>
