<svg xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Lightning bolt: represents a buy/sell signal -->
    <symbol id="icon-signal" viewBox="0 0 24 24">
      <path d="M13 2L4 14h7l-2 8 11-12h-7l2-8z"/>
    </symbol>

    <!-- Candlestick chart: represents a tradeable instrument -->
    <symbol id="icon-instrument" viewBox="0 0 24 24">
      <rect x="2" y="12" width="4" height="9" rx="1"/>
      <rect x="3" y="8" width="2" height="4"/>
      <rect x="9" y="6" width="4" height="15" rx="1"/>
      <rect x="10" y="2" width="2" height="4"/>
      <rect x="16" y="9" width="4" height="12" rx="1"/>
      <rect x="17" y="5" width="2" height="4"/>
    </symbol>

    <!-- Clock with hands: represents a historical backtest -->
    <symbol id="icon-backtest" viewBox="0 0 24 24">
      <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 2a8 8 0 100 16A8 8 0 0012 4z"/>
      <rect x="11" y="6" width="2" height="7"/>
      <rect x="11" y="11" width="5" height="2"/>
    </symbol>

    <!-- Building with windows: represents a broker/exchange -->
    <symbol id="icon-broker" viewBox="0 0 24 24">
      <path fill-rule="evenodd" d="M2 21V12L12 3l10 9v9H2z M7 13h4v5H7z M13 13h4v5h-4z"/>
    </symbol>

  </defs>
</svg>
