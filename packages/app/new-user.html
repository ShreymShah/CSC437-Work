<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoTrader — Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/reset.css" />
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/page.css" />
    <link rel="stylesheet" href="/styles/auth.css" />
    <script type="module" src="/src/login.ts"></script>
</head>
<body>
    <auth-provider redirect="/app">
        <a class="brand" href="/app">▲ AlgoTrader</a>
        <h2>Create Account</h2>
        <div class="card">
            <login-form api="/auth/register">
                <label><span>Username</span><input name="username" autocomplete="off" /></label>
                <label><span>Password</span><input type="password" name="password" /></label>
                <span slot="submit-label">Register</span>
            </login-form>
        </div>
        <p>Already have an account? <a href="/login.html">Sign in here</a></p>
    </auth-provider>
</body>
</html>
